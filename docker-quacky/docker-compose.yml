name: quacky

services:
    kafka: 
        image: confluentinc/cp-kafka:latest
        ports: 
            - 9092:9092
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    postgresql:
        image: postgres:latest
        restart: always
        ports:
            - 5432:5432
        shm_size: 128mb
        environment: 
            POSTGRES_PASSWORD: quackypass
            POSTGRES_USER: quacky
            POSTGRES_DB: quacky
        volumes:
            - postgres_data:/var/lib/postgresql
    
    pgadmin:
        image: dpage/pgadmin4:latest
        restart: always
        environment:
            PGADMIN_DEFAULT_EMAIL: quacky@quacky.quack
            PGADMIN_DEFAULT_PASSWORD: quackypass
            PGADMIN_CONFIG_SERVER_MODE: 'False'
        ports:
            - 5050:80
        depends_on:
            - postgresql
            
    mongodb:
        image: mongo:latest
        restart: always
        ports: 
            - 27017:27017
        environment: 
            MONGO_INITDB_ROOT_USERNAME: quacky
            MONGO_INITDB_ROOT_PASSWORD: quackypass
        volumes:
            - mongo_data:/data/db
            
    mongo-express:
        image: mongo-express:latest
        restart: always
        ports:
            - 8081:8081
        environment:
            ME_CONFIG_MONGODB_URL: mongodb://quacky:quackypass@mongodb:27017/
            ME_CONFIG_BASICAUTH_ENABLED: true
            ME_CONFIG_BASICAUTH_USERNAME: quacky
            ME_CONFIG_BASICAUTH_PASSWORD: quackypass
            
volumes:
    postgres_data:
    mongo_data: